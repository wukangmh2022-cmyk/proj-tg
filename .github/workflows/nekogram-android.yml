name: Nekogram Android Build

on:
  push:
    branches:
      - main
      - codex/nekogram-base
  workflow_dispatch:

jobs:
  build-nekogram:
    runs-on: ubuntu-latest
    env:
      NEKOGRAM_COMMIT: 40caf3b2
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;27.3.13750724"

      - name: Clone Nekogram base
        run: |
          git clone https://github.com/Nekogram/Nekogram.git nekogram-src
          git -C nekogram-src checkout "${NEKOGRAM_COMMIT}"
          git -C nekogram-src rev-parse --short HEAD

      - name: Create local.properties
        run: |
          cat > nekogram-src/local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          EOF

      - name: Create CI Extra.java
        run: |
          mkdir -p nekogram-src/TMessagesProj/src/main/java/tw/nekomimi/nekogram
          cat > nekogram-src/TMessagesProj/src/main/java/tw/nekomimi/nekogram/Extra.java <<'EOF'
          package tw.nekomimi.nekogram;

          import org.telegram.messenger.BuildConfig;

          import tw.nekomimi.nekogram.helpers.UserHelper;

          public class Extra {
              public static final int APP_ID = 4;
              public static final String APP_HASH = "014b35b6184100b085b0d0572f9b5103";
              public static final String PLAYSTORE_APP_URL = "https://github.com/wukangmh2022-cmyk/proj-tg";
              public static String WS_USER_AGENT = "";
              public static String WS_CONN_HASH = "";
              public static String WS_DEFAULT_DOMAIN = "";
              public static String TWPIC_BOT_USERNAME = null;
              public static boolean FORCE_ANALYTICS = false;
              public static String TLV_URL = "";
              public static String SENTRY_DSN = "";
              private static final long WEBVIEW_BOT_ID = 0L;

              public static boolean isDirectApp() {
                  return "release".equals(BuildConfig.BUILD_TYPE) || "debug".equals(BuildConfig.BUILD_TYPE);
              }

              public static UserHelper.BotInfo getHelperBot() {
                  return null;
              }

              public static UserHelper.UserInfoBot getUserInfoBot(boolean fallback) {
                  return null;
              }

              public static boolean isTrustedBot(long id) {
                  return id == WEBVIEW_BOT_ID;
              }
          }
          EOF

      - name: Create stub google-services.json
        run: |
          cat > /tmp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "glocalvision-ci",
              "storage_bucket": "glocalvision-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1111111111111111",
                  "android_client_info": {
                    "package_name": "tw.nekomimi.nekogram"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyD-glocalVision-ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:2222222222222222",
                  "android_client_info": {
                    "package_name": "tw.nekomimi.nekogram.beta"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyD-glocalVision-ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cp /tmp/google-services.json nekogram-src/TMessagesProj/google-services.json
          cp /tmp/google-services.json nekogram-src/TMessagesProj_App/google-services.json

      - name: Narrow ABI set for CI
        run: |
          perl -0pi -e 's/universalApk true/universalApk false/; s/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a"/' nekogram-src/TMessagesProj_App/build.gradle

      - name: Apply GlocalVision patch
        run: |
          chmod +x scripts/apply_nekogram_patch.sh
          ./scripts/apply_nekogram_patch.sh "${GITHUB_WORKSPACE}/nekogram-src"
          git -C nekogram-src status --short

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: nekogram-src
        run: |
          chmod +x gradlew
          mkdir -p ../dist
          set -o pipefail
          if ! ./gradlew :TMessagesProj_App:assembleDebug --stacktrace 2>&1 | tee ../dist/gradle-build.log; then
            awk '
              /\* What went wrong:/ { capture=1; next }
              /^\* Try:/ { capture=0 }
              capture { print }
            ' ../dist/gradle-build.log > ../dist/gradle-what-went-wrong.txt
            if [ ! -s ../dist/gradle-what-went-wrong.txt ]; then
              tail -n 120 ../dist/gradle-build.log > ../dist/gradle-what-went-wrong.txt
            fi
            error_message="$(tr '\n' ' ' < ../dist/gradle-what-went-wrong.txt | head -c 7000 | sed 's/%/%25/g; s/\r/%0D/g; s/:/%3A/g')"
            echo "::error title=Gradle build failed::${error_message}"
            exit 1
          fi

      - name: Collect APKs
        if: success()
        run: |
          mkdir -p dist
          find nekogram-src/TMessagesProj_App/build/outputs/apk -name '*.apk' -exec cp {} dist/ \;
          ls -lah dist

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glocalvision-nekogram-build-logs
          path: dist/gradle-build*

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: glocalvision-nekogram-debug
          path: dist/*.apk
